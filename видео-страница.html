    <section>
        <div class="video-container" id="video-container">
            <div class="video-view-container">
                <div class="vantube-logo">
                    <img src="style/VanTube logo.png" alt="">
                    <h2>VanTube</h2>
                </div>
                <div class="vantube-video-item" id="vantube-video-item">
                    <video id="vantube-video" src="#" poster="#"></video>  
                </div>
                <div class="video-controls">
                    <button id="video-play-button"><img id = "video-play-button-image" src="video_in_vantube/style/vantube video player/play button active.png" alt=""></button>
                    <div id="video-progress">
                        <input type="range" id="video-proggressbar-slider">
                    </div>
                    <button id="volume-muted"><img id="volume-muted-image" src="video_in_vantube/style/vantube video player/volume button unmute.png" alt=""></button>
                    <input type="range" id="volume-range-slider" min="0" max="1" step="0.1" value="0">
                </div>
            </div>
            <div class="author" id="author">
               
            </div>
            <div class="head" id="head">
                
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="VanTube datebase.js"></script>
        <script>
    /*Часть скрипта для загрузки данных для видео*/
            const video_container = document.getElementById("video-container");
            const vantube_video = document.getElementById("vantube-video")
            const author = document.getElementById("author")
            const head = document.getElementById("head")
            const search = new URLSearchParams(window.location.search);
            const id = Number(search.get('id'));
            const video = VideoDatabase[id-1];
            window.addEventListener("load", function () {
                vantube_video.src = video.src; vantube_video.poster = video.poster;
                author.innerHTML = 
                `<h3>${video.author}</h3>`
                head.innerHTML = 
                `<h2>${video.name}</h2>
                <p>${video.description}</p>`
            })
    /*Часть скрипта для функционирования видео-плеера*/
        const video_play_button = document.getElementById("video-play-button")
        const video_proggressbar_slider = document.getElementById("video-proggressbar-slider")
        const volume_muted = document.getElementById("volume-muted")
        const volume_range_slider = document.getElementById("volume-range-slider")
        const video_play_button_image = document.getElementById("video-play-button-image")
        const button_active = "video_in_vantube/style/vantube video player/play button active.png"
        const button_paused = "video_in_vantube/style/vantube video player/play button paused.png"
        const volume_muted_image = document.getElementById("volume-muted-image")
        const img_muted = "video_in_vantube/style/vantube video player/volume button mute.png"
        const img_unmuted = "video_in_vantube/style/vantube video player/volume button unmute.png"
        video_play_button.addEventListener("click", function() {
            if(vantube_video.paused === true) {
                vantube_video.play()
                video_play_button_image.src = button_paused
            }
            else {
                vantube_video.pause()
                video_play_button_image.src = button_active
            }
        })
        vantube_video.addEventListener("timeupdate", function () {
            const progress = (vantube_video.currentTime / vantube_video.duration) * 100
            video_proggressbar_slider.value = progress
        })
        video_proggressbar_slider.addEventListener("input", function () {
            const newTime = (video_proggressbar_slider.value / 100 )* vantube_video.duration;
            vantube_video.currentTime = newTime;
        })
        volume_muted.addEventListener("click", function() {
           if (vantube_video.volume > 0) {
            vantube_video.volume = 0; volume_range_slider.value = 0; volume_muted_image.src = img_muted}
           else {
            vantube_video.volume = 0.5; volume_range_slider.value = 0.5;
            volume_muted_image.src = img_unmuted}
        })
        volume_range_slider.addEventListener("input", function() {
            vantube_video.volume = volume_range_slider.value
            if (volume_range_slider.value > 0) {
                volume_muted_image.src = img_unmuted
            }
            else {
                volume_muted_image.src = img_muted
            }
        })
        </script>

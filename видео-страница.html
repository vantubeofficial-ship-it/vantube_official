    <section>
        <div class="video-container" id="video-container">
            <div class="vantube-logo">
                <img src="style/VanTube logo.png" alt="">
                <h2>VanTube</h2>
            </div>
            <div class="video-item">
                <video src="video_in_vantube/style/video №1.mp4" poster="https://i.ytimg.com/vi/I5VcCqK6pPM/hqdefault.jpg?sqp=-oaymwEcCNACELwBSFXyq4qpAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLD2I1wynZtq9pTQjCZqIJN0_f_XzQ" controls></video>
            </div>
            <div class="author">
                <h3>Автор видео</h3>
            </div>
            <div class="head">
                <h2>Windows в PowerPoint'е</h2>
                <p>Посмотреть полное видео с более хорошим качеством можно в <a href="">нашем TG</a></p>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="VanTube datebase.js"></script>
        <script>
            const video_container = document.getElementById("video-container");
            const search = new URLSearchParams(window.location.search);
            const id = Number(search.get('id'));
            const video = VideoDatabase[id-1];
            window.addEventListener("load", function () {
                video_container.innerHTML = `<div class="vantube-logo">
                <img src="style/VanTube logo.png" alt="">
                <h2>VanTube</h2>
            </div>
            <div class="video-item">
                <video src="${video.src}" poster="${video.poster}" controls></video>
            </div>
            <div class="author">
                <h3>${video.author}</h3>
            </div>
            <div class="head">
                <h2>${video.name}</h2>
                <p>${video.description}</p>
            </div>`
            })
        </script>
    </section>
